<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># 安装 Node.js（如未安装）</span>

<span class="hljs-comment"># 安装 OpenClaw</span>
npm install -g openclaw

<span class="hljs-comment"># 验证安装</span>
openclaw --version
</code></pre>
<h3 id="windows">Windows</h3>

</code></pre>

<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-text">总成本 = 输入 Token × 输入单价 + 输出 Token × 输出单价
</code></pre>
<p>补充：</p>
<ul>
<li>输出 token 通常比输入更贵</li>
<li>长上下文 + 长输出 = 成本快速上升</li>
<li>生产环境要做“token 预算”与“响应上限”</li>
</ul>
<p>可运行示例（Python）：</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">def</span> <span class="hljs-title function_">estimate_cost</span>(<span class="hljs-params">input_tokens: <span class="hljs-built_in">int</span>, output_tokens: <span class="hljs-built_in">int</span>, in_price_per_m: <span class="hljs-built_in">float</span>, out_price_per_m: <span class="hljs-built_in">float</span></span>) -&gt; <span class="hljs-built_in">float</span>:
    <span class="hljs-keyword">return</span> input_tokens / <span class="hljs-number">1_000_000</span> * in_price_per_m + output_tokens / <span class="hljs-number">1_000_000</span> * out_price_per_m

<span class="hljs-comment"># 示例：输入120k、输出30k，按 GPT-5.3 Pro 参考价估算</span>
cost = estimate_cost(<span class="hljs-number">120_000</span>, <span class="hljs-number">30_000</span>, in_price_per_m=<span class="hljs-number">10.0</span>, out_price_per_m=<span class="hljs-number">30.0</span>)
<span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;estimated_cost=$<span class="hljs-subst">{cost:<span class="hljs-number">.2</span>f}</span>&quot;</span>)
</code></pre>

<p>CoT 核心：要求模型显示中间推理步骤。</p>
<p>常用触发语：</p>
<ul>
<li>“请一步一步思考”</li>
<li>“先列假设，再推导结论”</li>
<li>“写出计算过程与检查步骤”</li>
</ul>
