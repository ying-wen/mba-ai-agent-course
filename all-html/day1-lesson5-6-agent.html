<blockquote>
<p><img class="emoji" draggable="false" alt="📚" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@16.0.1/assets/svg/1f4da.svg" data-marp-twemoji=""/> 来源: <a href="https://openai.com/business/guides-and-resources/a-practical-guide-to-building-ai-agents/">A Practical Guide to Building Agents</a></p>

<td><strong>工具访问</strong></td>
<td>动态选择合适工具与外部系统交互</td>

</tr>

<td><strong>明确边界</strong></td>

</tr>

<h1 id="agent-vs-workflow">Agent vs Workflow</h1>
<div class="two-col">
<div class="card">
<h3 id="workflow%E6%B5%81%E7%A8%8B%E7%BC%96%E6%8E%92">Workflow（流程编排）</h3>
<ul>
<li>路径预先写死</li>
<li>规则驱动</li>
<li>可预测、易审计</li>
<li>适合标准化流程</li>
</ul>
</div>
<div class="card">
<h3 id="agent%E6%99%BA%E8%83%BD%E4%BD%93">Agent（智能体）</h3>
<ul>
<li>路径运行时生成</li>
<li>LLM自主决策</li>
<li>灵活但不确定</li>
<li>适合开放任务</li>
</ul>
</div>
</div>
</section>

<h1 id="anthropic%E7%9A%84%E6%A0%B8%E5%BF%83%E5%BB%BA%E8%AE%AE">Anthropic的核心建议</h1>
<blockquote>
<p>&quot;Success in the LLM space isn't about building the most sophisticated system. It's about building the <strong>right system</strong> for your needs.&quot;</p>
</blockquote>
<p><strong>三原则</strong>：</p>
<ol>
<li><strong>保持简单</strong> — 能用简单方案就不要复杂化</li>
<li><strong>保持透明</strong> — 显式展示Agent的规划步骤</li>
<li><strong>精心设计ACI</strong> — Agent-Computer Interface和HCI一样重要</li>
</ol>

<th>方法</th>
<th>优势</th>
<th>劣势</th>

<tr>

<td>对有效变体不灵活</td>
</tr>
<tr>
<td><strong>Model-based</strong></td>

<td>非确定性、需校准</td>
</tr>
<tr>
<td><strong>Human</strong></td>
<td>专家评审、众包判断、A/B测试</td>

</tr>

<h1 id="%E9%9D%9E%E7%A1%AE%E5%AE%9A%E6%80%A7%E6%8C%87%E6%A0%87passk-vs-passk">非确定性指标：pass@k vs pass^k</h1>
<table>
<thead>
<tr>
<th>指标</th>
<th>含义</th>
<th>k增加时</th>
<th>适用场景</th>

</thead>
<tbody>
<tr>
<td><strong>pass@k</strong></td>
<td>k次尝试中至少1次成功的概率</td>
<td>上升</td>
<td>只要有一个方案work即可</td>
</tr>
<tr>
<td><strong>pass^k</strong></td>
<td>k次尝试全部成功的概率</td>
<td>下降</td>
<td>面向用户，要求一致性</td>
</tr>
</tbody>
</table>
<blockquote>
<p>示例：75%单次成功率，3次trial</p>
<ul>
<li>pass@3 ≈ 98% (至少1次成功)</li>
<li>pass^3 ≈ 42% (全部成功)</li>
</ul>
</blockquote>

<h1 id="eval%E5%BB%BA%E8%AE%BE%E8%B7%AF%E7%BA%BF%E5%9B%BE">Eval建设路线图</h1>
<table>
<thead>
<tr>
<th>步骤</th>
<th>行动</th>
<th>目标</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>0. 尽早开始</strong></td>
<td>20-50个真实失败case</td>
<td>有比没有强</td>
</tr>
<tr>
<td><strong>1. 从手动测试开始</strong></td>
<td>把上线前检查转为自动化</td>
<td>覆盖已知场景</td>
</tr>
<tr>
<td><strong>2. 明确任务规范</strong></td>
<td>两个专家应得出相同判断</td>
<td>消除歧义</td>
</tr>
<tr>
<td><strong>3. 平衡正负样本</strong></td>
<td>既测该做的，也测不该做的</td>
<td>避免过度优化</td>
</tr>
<tr>
<td><strong>4. 隔离环境</strong></td>
<td>每次trial从干净状态开始</td>
<td>消除共享状态干扰</td>
</tr>
<tr>
<td><strong>5. 评分结果而非路径</strong></td>
<td>允许Agent创造性解法</td>
<td>避免过度约束</td>
</tr>
<tr>
<td><strong>6. 读Transcript</strong></td>
<td>理解失败原因</td>
<td>校准Grader</td>
</tr>
<tr>
<td><strong>7. 监控饱和</strong></td>
<td>100%通过率=失去信号</td>
<td>持续升级难度</td>
</tr>
</tbody>
</table>
</section>

</code></pre>

<h1 id="%E8%AF%84%E4%BC%B0%E6%96%B9%E6%B3%95%E7%BB%84%E5%90%88%E7%91%9E%E5%A3%AB%E5%A5%B6%E9%85%AA%E6%A8%A1%E5%9E%8B">评估方法组合（瑞士奶酪模型）</h1>
<table>
<thead>
<tr>
<th>方法</th>
<th>优势</th>
<th>劣势</th>
<th>阶段</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Automated Evals</strong></td>
<td>快速、可复现、每次提交都跑</td>
<td>需维护、可能与真实使用不符</td>
<td>开发期</td>
</tr>
<tr>
<td><strong>生产监控</strong></td>
<td>真实用户行为</td>
<td>被动、有噪声</td>
<td>上线后</td>
</tr>
<tr>
<td><strong>A/B测试</strong></td>
<td>测量真实用户结果</td>
<td>慢、需要流量</td>
<td>大变更验证</td>
</tr>
<tr>
<td><strong>用户反馈</strong></td>
<td>发现意外问题</td>
<td>稀疏、偏向严重问题</td>
<td>持续</td>
</tr>
<tr>
<td><strong>人工评审</strong></td>
<td>金标准质量</td>
<td>贵、不规模化</td>
<td>校准LLM Grader</td>
</tr>
</tbody>
</table>
<blockquote>
<p>没有单一方法能覆盖所有问题，组合使用形成多层防护</p>
</blockquote>
