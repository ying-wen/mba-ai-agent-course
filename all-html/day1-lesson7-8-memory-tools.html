<li><strong>高成本信息</strong>：获取困难且可信来源</li>
</ul>
<p>避免：噪声、情绪化瞬时内容、未经验证数据。</p>

<h1 id="just-in-time-context-%E5%8D%B3%E6%97%B6%E4%B8%8A%E4%B8%8B%E6%96%87">Just-in-Time Context (即时上下文)</h1>
<p><strong>传统方式</strong>：预先检索所有可能相关的内容</p>
<p><strong>JIT方式</strong>：Agent按需动态加载</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-text">Agent保持轻量引用 (文件路径、查询、链接)
     ↓
运行时用工具动态加载
     ↓
只在context中保留当前需要的
</code></pre>
<p><strong>优势</strong>：更高效、更聚焦、避免信息过载</p>
