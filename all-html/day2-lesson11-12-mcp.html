<h1 id="mcp%E7%9A%84%E8%AE%BE%E8%AE%A1%E5%93%B2%E5%AD%A6">MCP的设计哲学</h1>
<ol>
<li><strong>协议优先</strong>：先统一接口，再谈生态繁荣</li>
<li><strong>能力可发现</strong>：工具能力应可枚举、可理解</li>
<li><strong>模型无关</strong>：不绑定某个LLM厂商</li>
<li><strong>传输可替换</strong>：stdio、本地；HTTP、远程</li>
<li><strong>安全可治理</strong>：权限、审计、边界明确</li>
</ol>

<h1 id="%E7%AE%A1%E7%90%86%E8%80%85%E7%BF%BB%E8%AF%91%E9%A1%B5%E2%91%A0%E4%B8%BA%E4%BB%80%E4%B9%88%E8%BF%99%E9%83%A8%E5%88%86%E5%92%8C%E4%BD%A0%E6%9C%89%E5%85%B3">管理者翻译页①｜为什么这部分和你有关</h1>
<ul>
<li><strong>业务价值</strong>：标准化后，跨部门自动化项目的交付周期通常可从“按月”缩短到“按周”</li>
<li><strong>主要风险</strong>：若没有统一协议，后续每新增一个系统都会带来额外集成债务</li>
<li><strong>预算影响</strong>：前期会增加协议改造投入（约占PoC预算10%-20%），但可显著降低后续维护成本</li>
</ul>

<h1 id="%E4%B8%BA%E4%BB%80%E4%B9%88%E8%A6%81%E9%87%8D%E8%A7%86id">为什么要重视<code>id</code></h1>

<li>便于Tracing：日志、链路、故障回放</li>
<li>与业务<code>trace_id</code>映射，可打通观测平台</li>
</ul>
<p><strong>建议</strong>：<code>id</code>使用可追踪格式，如<code>trace-uuid-step</code>。</p>

<blockquote>
<p>来源: <a href="https://www.anthropic.com/engineering/building-effective-agents">Building Effective Agents</a> - Appendix 2</p>
</blockquote>
<p><strong>核心观点</strong>：ACI (Agent-Computer Interface) 和 HCI 一样重要</p>
<p><strong>工具设计原则</strong>：</p>
<ol>
<li><strong>站在模型角度思考</strong> — 描述是否足够清晰？</li>
<li><strong>测试模型如何使用</strong> — 用Workbench观察失败模式</li>
<li><strong>Poka-yoke</strong> — 防呆设计，让错误难以发生</li>
<li><strong>给足思考空间</strong> — 避免让模型&quot;写进死角&quot;</li>
</ol>
