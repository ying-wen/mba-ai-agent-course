p, li { font-size: 0.92em; }
strong { color: #0b3b8c; }
pre {
  background: #1e293b;
  color: #e2e8f0;
  background: #1e293b;

  border-radius: 10px;
  padding: 14px 16px;
  font-size: 0.58em;
  line-height: 1.4;
}
pre code {
  background: transparent;
  color: #e2e8f0;
  padding: 0;
}

  background: #dbeafe;
  color: #1e3a8a;
  border-radius: 4px;
  padding: 2px 6px;
  font-size: 0.9em;
}

  width: 100%;
  font-size: 0.74em;
  border-collapse: collapse;
}

  background: #cbd5e1;
  color: #0f172a;
  padding: 8px;
  border: 1px solid #94a3b8;
}
td {
  background: #ffffff;
  padding: 8px;
  border: none;
}
blockquote {
  border-left: 4px solid #3b82f6;
  margin: 0.8em 0;
  padding: 0.55em 0.9em;
  background: #eef2ff;
  color: #334155;
  border-radius: 0 8px 8px 0;
}
a { color: #1d4ed8; text-decoration: underline; }
.small { font-size: 0.72em; color: #475569; }
