              └→ Subagent3: 搜索方向C
           ← 汇总 → Citation Agent → 最终报告
</code></pre>

<h1 id="anthropic%E7%9A%84prompting%E5%8E%9F%E5%88%99">Anthropic的Prompting原则</h1>
<ol>
<li><strong>像Agent一样思考</strong> — 用Console模拟，观察失败模式</li>
<li><strong>教会Orchestrator如何委派</strong> — 详细任务描述，避免重复/遗漏</li>
<li><strong>努力匹配查询复杂度</strong> — 简单任务1个Agent，复杂任务10+个</li>
<li><strong>工具设计至关重要</strong> — 差的工具描述会误导Agent</li>
<li><strong>让Agent自我改进</strong> — 用Claude优化Prompt和工具描述</li>
<li><strong>先宽后窄</strong> — 从宽泛搜索开始，逐步聚焦</li>
<li><strong>引导思考过程</strong> — 用Extended Thinking做可控的草稿纸</li>
</ol>

<ul>
<li>提升覆盖度：多视角减少漏项</li>
<li>提升可靠性：交叉验证减少幻觉</li>
<li>提升效率：并行执行缩短端到端时间</li>

<table>
<thead>
<tr>
<th>模式</th>
<th>核心结构</th>
<th>典型优点</th>
<th>典型风险</th>
</tr>
</thead>
<tbody>
<tr>
<td>流水线（Pipeline）</td>
<td>顺序交接</td>
<td>可控、清晰</td>
<td>累积误差</td>
</tr>
<tr>
<td>主管-执行（Supervisor）</td>
<td>中心调度</td>
<td>灵活、可中断</td>
<td>调度压力集中</td>
</tr>
<tr>
<td>辩论（Debate）</td>
<td>多角色博弈</td>
<td>决策质量高</td>
<td>成本高、轮次长</td>
</tr>
<tr>
<td>群体/黑板（Swarm/Blackboard）</td>
<td>去中心化协作</td>
<td>可扩展、鲁棒</td>
<td>一致性难</td>
</tr>
</tbody>
</table>

<ul>

<li>创建一个包含 2~3 个文件的小项目（如 <code>README.md</code> + <code>plan.md</code> + <code>todo.md</code>）</li>
<li>在 Composer 输入：
<ul>
<li>&quot;请基于这3个文件，生成一版可执行的一周迭代计划，并直接改写文件。&quot;</li>
</ul>
</li>
</ul>
<p>观察点：</p>
<ul>
<li>是否能跨文件理解上下文</li>
<li>修改是否可预览、可回退</li>
<li>你是否仍然保持&quot;主导权&quot;</li>
</ul>

  padding: 46px 62px;
  line-height: 1.45;
}

h1, h2, h3 { margin: 0 0 0.45em 0; }
h1 { color: #0f172a; font-size: 1.7em; }
h2 { color: #334155; font-size: 1.25em; }
h3 { color: #475569; font-size: 1.0em; }

ul, ol { margin-top: 0.3em; }
li { margin: 0.18em 0; }

pre {
  background: #1e293b;
  color: #e2e8f0;
  background: #1e293b;
  color: #e2e8f0;
  border-radius: 10px;
  padding: 14px 16px;
  font-size: 0.58em;
  line-height: 1.4;
}
pre code {
  background: transparent;
  color: #e2e8f0;
  padding: 0;
}
code {
  background: #dbeafe;
  color: #1e3a8a;
  border-radius: 4px;
  padding: 2px 6px;
  font-size: 0.9em;
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.72em;
}

th {
  background: #cbd5e1;
  color: #0f172a;
  border: 1px solid #94a3b8;
  padding: 6px 8px;
}

td {
  background: #ffffff;
  border: none;
  padding: 6px 8px;
}

a { color: #2563eb; text-decoration: underline; }

.muted { color: #64748b; font-size: 0.85em; }
.small { font-size: 0.82em; }
.tiny { font-size: 0.70em; }
.tag {
  display: inline-block;
  background: #dbeafe;
  color: #1e40af;
  border-radius: 999px;
  padding: 2px 10px;
  margin-right: 8px;
  font-size: 0.72em;
}
.card {
  background: #ffffff;
  border: none;
  border-radius: 12px;
  padding: 12px 14px;
}
